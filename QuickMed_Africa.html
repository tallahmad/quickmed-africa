<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuickMed Africa</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sora', sans-serif; background: #f0fdf4; display: flex; justify-content: center; min-height: 100vh; }
.app { width: 100%; max-width: 430px; min-height: 100vh; background: #f0fdf4; display: flex; flex-direction: column; }

/* Header */
.header { background: linear-gradient(135deg, #064e3b, #065f46); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
.header-left { display: flex; align-items: center; gap: 12px; }
.header-logo { font-size: 28px; }
.header-title { color: #fff; font-weight: 700; font-size: 16px; }
.header-status { display: flex; align-items: center; gap: 5px; color: #6ee7b7; font-size: 11px; }
.status-dot { width: 6px; height: 6px; border-radius: 50%; background: #34d399; animation: pulse 2s infinite; }

/* Navigation principale */
.nav-tabs { display: flex; background: #fff; border-bottom: 1px solid #d1fae5; }
.nav-tab { flex: 1; padding: 12px 4px; background: none; border: none; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; color: #6b7280; font-family: 'Sora', sans-serif; font-size: 11px; font-weight: 600; }
.nav-tab.active { color: #065f46; border-bottom: 2px solid #059669; }

/* Sous-catégories */
.sub-categories { display: flex; background: #f9fafb; padding: 8px 12px; gap: 8px; overflow-x: auto; white-space: nowrap; border-bottom: 1px solid #e5e7eb; }
.sub-btn { background: white; border: 1px solid #d1d5db; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 500; color: #374151; cursor: pointer; }
.sub-btn.active { background: #059669; border-color: #059669; color: white; }

/* Contenu */
.content { flex: 1; overflow-y: auto; padding: 16px; }
.card { background: white; border-radius: 16px; padding: 16px; margin-bottom: 16px; border: 1px solid #e5e7eb; }
.card-title { font-size: 16px; font-weight: 700; color: #064e3b; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

/* Listes */
.list-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-bottom: 1px solid #f0fdf4; cursor: pointer; }
.list-item:last-child { border-bottom: none; }
.list-item-icon { width: 40px; height: 40px; border-radius: 12px; background: #f0fdf4; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.list-item-content { flex: 1; }
.list-item-title { font-weight: 600; color: #1f2937; font-size: 14px; }
.list-item-sub { color: #6b7280; font-size: 12px; margin-top: 2px; }

/* Chat IA */
.chat-container { display: flex; flex-direction: column; gap: 16px; }
.messages { display: flex; flex-direction: column; gap: 12px; max-height: 400px; overflow-y: auto; padding: 4px; }
.msg-row { display: flex; gap: 8px; align-items: flex-end; }
.msg-row.user { justify-content: flex-end; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: #064e3b; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 13px; line-height: 1.5; white-space: pre-wrap; }
.bubble.user { background: #059669; color: white; border-bottom-right-radius: 4px; }
.bubble.bot { background: white; border: 1px solid #bbf7d0; border-bottom-left-radius: 4px; color: #1f2937; }

/* Input */
.input-bar { display: flex; gap: 8px; padding: 12px; background: white; border-radius: 30px; border: 1px solid #bbf7d0; }
.input-field { flex: 1; padding: 8px 12px; background: transparent; border: none; font-size: 13px; outline: none; font-family: 'Sora', sans-serif; }
.send-btn { width: 40px; height: 40px; border-radius: 50%; background: #059669; color: white; border: none; cursor: pointer; }

/* Utilitaires */
.hidden { display: none; }
.typing-dots { display: flex; gap: 4px; padding: 8px; }
.typing-dot { width: 6px; height: 6px; border-radius: 50%; background: #059669; animation: bounce 1s infinite; }
.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <img src="logo-quickmed.png" alt="QuickMed Africa" style="height: 36px; width: auto;">   
      <div>
        <div class="header-title">QuickMed Africa</div>
        <div class="header-status"><span class="status-dot"></span> Protocoles MSAS actifs</div>
      </div>
    </div>
  </div>

  <!-- NAVIGATION PRINCIPALE -->
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchMainTab('explorer', this)">📚<span>Explorer</span></button>
    <button class="nav-tab" onclick="switchMainTab('ia', this)">🤖<span>Assistant IA</span></button>
    <button class="nav-tab" onclick="switchMainTab('urgences', this)">🚨<span>Urgences</span></button>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div class="content" id="main-content">
    
    <!-- SECTION EXPLORER -->
    <div id="explorer-view">
      <div class="sub-categories">
        <button class="sub-btn active" onclick="switchSubTab('pathologies', this)">Pathologies</button>
        <button class="sub-btn" onclick="switchSubTab('symptomes', this)">Symptômes</button>
        <button class="sub-btn" onclick="switchSubTab('medicaments', this)">Médicaments</button>
      </div>

      <div id="sub-pathologies">
        <div class="card">
          <div class="card-title"><span>🏥</span> Pathologies MSAS</div>
          <div class="list-container" id="pathologies-list"></div>
        </div>
      </div>

      <div id="sub-symptomes" class="hidden">
        <div class="card">
          <div class="card-title"><span>🔍</span> Symptômes</div>
          <div class="list-container" id="symptomes-list"></div>
        </div>
      </div>

      <div id="sub-medicaments" class="hidden">
        <div class="card">
          <div class="card-title"><span>💊</span> Médicaments essentiels</div>
          <div class="list-container" id="medicaments-list"></div>
        </div>
      </div>
    </div>

    <!-- SECTION IA AVEC VOTRE NOUVELLE CLÉ -->
    <div id="ia-view" class="hidden">
      <div class="card">
        <div class="card-title"><span>🤖</span> Assistant Clinique</div>
        <p style="font-size: 13px; color: #4b5563; margin-bottom: 16px;">Posez votre question clinique. Réponse basée sur les protocoles MSAS.</p>
        
        <div class="chat-container">
          <div class="messages" id="ia-messages">
            <div class="msg-row bot">
              <div class="avatar">⚕️</div>
              <div class="bubble bot">Bonjour ! Je suis l'assistant QuickMed. Décrivez votre cas clinique.</div>
            </div>
          </div>
          
          <div class="input-bar">
            <input class="input-field" id="ia-input" placeholder="Ex: Enfant 8kg, fièvre 39°C..." onkeydown="if(event.key==='Enter')sendIA()"/>
            <button class="send-btn" onclick="sendIA()">➤</button>
          </div>
        </div>
      </div>
    </div>

    <!-- SECTION URGENCES -->
    <div id="urgences-view" class="hidden">
      <div class="card" style="background: linear-gradient(135deg, #7f1d1d, #dc2626); color: white;">
        <div class="card-title" style="color: white;"><span>🚨</span> Protocoles d'urgence</div>
      </div>
      <div class="card">
        <div class="list-container" id="urgences-list"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================
// VOTRE NOUVELLE CLÉ GEMINI (ACTIVE)
// ============================================
const GEMINI_KEY = "AIzaSyCeOLjmcBTNHvu5V889UYEzanD-lWPvFJE";

// ============================================
// DONNÉES DEPUIS VOS FICHIERS CSV
// ============================================

const PATHOLOGIES = [
  { nom: "Paludisme Simple", description: "Fièvre, frissons, TDR positif, pas de signe de gravité", specialite: "Infectiologie" },
  { nom: "Paludisme Grave", description: "Convulsions, coma, anémie sévère, TDR positif", specialite: "Urgences" },
  { nom: "Éclampsie", description: "TA ≥160/110, convulsions, grossesse ≥20 semaines", specialite: "Obstétrique" },
  { nom: "Diarrhée Aiguë", description: "Diarrhée ≥3 selles/jour, déshydratation possible", specialite: "Gastro-entérologie" },
  { nom: "Malnutrition Aiguë Sévère", description: "PB <115mm, œdèmes bilatéraux", specialite: "Nutrition" },
  { nom: "Méningite", description: "Fièvre, raideur nucale, céphalées intenses", specialite: "Neurologie" }
];

const SYMPTOMES = [
  { nom: "Fièvre", description: "Température corporelle élevée", gravite: "Modérée", alerte: "Non" },
  { nom: "Maux de tête", description: "Douleur au niveau de la tête", gravite: "Légère", alerte: "Non" },
  { nom: "Douleur thoracique", description: "Inconfort dans la poitrine", gravite: "Sévère", alerte: "Oui" },
  { nom: "Essoufflement", description: "Difficulté à respirer", gravite: "Sévère", alerte: "Oui" },
  { nom: "Réaction allergique sévère", description: "Gonflement, urticaire", gravite: "Sévère", alerte: "Oui" }
];

const MEDICAMENTS = [
  { nom: "Paracétamol", classe: "Antalgique", posologie: "500 mg à 1 g toutes les 4-6h", disponibilite: "Disponible" },
  { nom: "Amoxicilline", classe: "Antibiotique", posologie: "500 mg à 1 g toutes les 8h", disponibilite: "Disponible" },
  { nom: "Metformine", classe: "Antidiabétique", posologie: "500 mg à 1 g 2-3x/jour", disponibilite: "Disponible" },
  { nom: "Amlodipine", classe: "Antihypertenseur", posologie: "5 à 10 mg/jour", disponibilite: "Disponible" },
  { nom: "Salbutamol", classe: "Bronchodilatateur", posologie: "100-200 µg par inhalation", disponibilite: "Disponible" }
];

const URGENCES = [
  { nom: "Protocole Paludisme Simple", description: "Artemether-Lumefantrine 4cp H0, H8, J1, J2" },
  { nom: "Protocole Paludisme Grave", description: "Artésunate IV 2.4mg/kg à H0 H12 H24" },
  { nom: "Protocole Éclampsie", description: "MgSO4 4g IV en 15min — Nifédipine 10mg" }
];

// ============================================
// AFFICHAGE DES LISTES
// ============================================

window.onload = function() {
  displayPathologies();
  displaySymptomes();
  displayMedicaments();
  displayUrgences();
};

function displayPathologies() {
  const container = document.getElementById('pathologies-list');
  container.innerHTML = '';
  PATHOLOGIES.forEach(p => {
    container.innerHTML += `
      <div class="list-item" onclick="quickIA('${p.nom} : ${p.description}')">
        <div class="list-item-icon">🏥</div>
        <div class="list-item-content">
          <div class="list-item-title">${p.nom}</div>
          <div class="list-item-sub">${p.description.substring(0, 50)}...</div>
        </div>
      </div>
    `;
  });
}

function displaySymptomes() {
  const container = document.getElementById('symptomes-list');
  container.innerHTML = '';
  SYMPTOMES.forEach(s => {
    container.innerHTML += `
      <div class="list-item" onclick="quickIA('Symptôme : ${s.nom} - ${s.description}')">
        <div class="list-item-icon">🔍</div>
        <div class="list-item-content">
          <div class="list-item-title">${s.nom}</div>
          <div class="list-item-sub">${s.description}</div>
        </div>
      </div>
    `;
  });
}

function displayMedicaments() {
  const container = document.getElementById('medicaments-list');
  container.innerHTML = '';
  MEDICAMENTS.forEach(m => {
    container.innerHTML += `
      <div class="list-item" onclick="quickIA('Médicament : ${m.nom} - ${m.classe}')">
        <div class="list-item-icon">💊</div>
        <div class="list-item-content">
          <div class="list-item-title">${m.nom}</div>
          <div class="list-item-sub">${m.classe}</div>
        </div>
      </div>
    `;
  });
}

function displayUrgences() {
  const container = document.getElementById('urgences-list');
  container.innerHTML = '';
  URGENCES.forEach(u => {
    container.innerHTML += `
      <div class="list-item" onclick="quickIA('URGENCE : ${u.nom} - ${u.description}')">
        <div class="list-item-icon" style="background:#fee2e2;">🚨</div>
        <div class="list-item-content">
          <div class="list-item-title">${u.nom}</div>
          <div class="list-item-sub">${u.description}</div>
        </div>
      </div>
    `;
  });
}

// ============================================
// NAVIGATION
// ============================================

function switchMainTab(tab, btn) {
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  document.getElementById('explorer-view').classList.add('hidden');
  document.getElementById('ia-view').classList.add('hidden');
  document.getElementById('urgences-view').classList.add('hidden');
  
  document.getElementById(tab + '-view').classList.remove('hidden');
}

function switchSubTab(tab, btn) {
  document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  document.getElementById('sub-pathologies').classList.add('hidden');
  document.getElementById('sub-symptomes').classList.add('hidden');
  document.getElementById('sub-medicaments').classList.add('hidden');
  
  document.getElementById('sub-' + tab).classList.remove('hidden');
}

// ============================================
// ASSISTANT GEMINI (AVEC VOTRE NOUVELLE CLÉ)
// ============================================

let busy = false;

function quickIA(question) {
  switchMainTab('ia', document.querySelectorAll('.nav-tab')[1]);
  document.getElementById('ia-input').value = question;
  sendIA();
}

function sendIA() {
  const input = document.getElementById('ia-input');
  const question = input.value.trim();
  if (!question || busy) return;
  
  addMessage(question, 'user');
  input.value = '';
  
  callGemini(question);
}

function addMessage(text, role) {
  const container = document.getElementById('ia-messages');
  const row = document.createElement('div');
  row.className = 'msg-row ' + role;
  
  if (role === 'bot') {
    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '⚕️';
    row.appendChild(avatar);
  }
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble ' + role;
  bubble.textContent = text;
  row.appendChild(bubble);
  
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

function addTyping() {
  const container = document.getElementById('ia-messages');
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-row';
  
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = '⚕️';
  row.appendChild(avatar);
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble bot';
  bubble.innerHTML = '<div class="typing-dots"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
  row.appendChild(bubble);
  
  container.appendChild(row);
  container.scrollTop = container.scrollHeight;
}

async function callGemini(question) {
  busy = true;
  addTyping();
  
  // Liste des modèles à essayer (du plus récent au plus ancien)
  const modelsToTry = [
    'gemini-2.5-flash',
    'gemini-2.5-pro', 
    'gemini-3-flash',
    'gemini-3-pro'
  ];
  
  try {
    const SYSTEM_PROMPT = `Tu es QuickMed Africa, un assistant médical basé sur les protocoles du Ministère de la Santé du Sénégal (MSAS). Réponds UNIQUEMENT avec des informations médicales précises. Structure ta réponse avec des tirets et des sauts de ligne. Termine par ⚠️ URGENCE ou ✅ AMBULATOIRE.`;
    
    const fullPrompt = SYSTEM_PROMPT + "\n\nQuestion: " + question;
    
    let lastError = null;
    let success = false;
    
    for (const model of modelsToTry) {
      try {
        console.log(`Tentative avec modèle: ${model}`);
        
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_KEY}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: fullPrompt }] }],
            generationConfig: { temperature: 0.3, maxOutputTokens: 800 }
          })
        });
        
        const data = await response.json();
        
        if (data.candidates && data.candidates[0]?.content?.parts[0]?.text) {
          document.getElementById('typing-row')?.remove();
          addMessage(data.candidates[0].content.parts[0].text, 'bot');
          success = true;
          break;
        } else if (data.error) {
          lastError = data.error.message;
          console.log(`Modèle ${model} a échoué:`, data.error.message);
        }
      } catch (e) {
        lastError = e.message;
        console.log(`Erreur avec ${model}:`, e.message);
      }
    }
    
    if (!success) {
      document.getElementById('typing-row')?.remove();
      
      // Message de secours avec les protocoles
      const fallbackMessage = getFallbackResponse(question);
      addMessage(fallbackMessage, 'bot');
    }
    
  } catch (error) {
    document.getElementById('typing-row')?.remove();
    const fallbackMessage = getFallbackResponse(question);
    addMessage(fallbackMessage, 'bot');
  }
  
  busy = false;
}

// Fonction de secours avec les protocoles pré-enregistrés
function getFallbackResponse(question) {
  const q = question.toLowerCase();
  
  if (q.includes('paludisme') && q.includes('enfant')) {
    return `📋 **Protocole Paludisme Enfant**\n\n` +
      `• Artéméther-Luméfantrine (AL):\n` +
      `• Enfant 8kg: 1 comprimé 2x/j pendant 3 jours\n` +
      `• À prendre avec un aliment gras\n` +
      `• Surveillance de la fièvre à J2-J3\n\n` +
      `✅ AMBULATOIRE\n` +
      `Source: MSAS Sénégal 2025`;
  }
  
  if (q.includes('enceinte') && q.includes('ta')) {
    return `📋 **Protocole Hypertension Gravidique**\n\n` +
      `• Repos, position latérale gauche\n` +
      `• Nifédipine 10mg si TA ≥160/110\n` +
      `• Rechercher protéinurie\n` +
      `• Surveillance TA toutes les 15min\n\n` +
      `⚠️ URGENCE - Référence maternité\n` +
      `Source: MSAS Sénégal 2025`;
  }
  
  return `📋 **Assistant Clinique QuickMed**\n\n` +
    `Les modèles API sont temporairement indisponibles. Consultez l'onglet "Explorer" pour accéder directement aux protocoles MSAS.`;
}
</script>
</body>
</html>
